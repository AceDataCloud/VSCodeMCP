name: Publish VS Code Extension

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [mcp-updated]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Generate CalVer version
        run: |
          # Version format: YYYY.M.D.BUILD
          DATE_PREFIX=$(date +'%Y.%-m.%-d')

          # Query marketplace for latest version to determine build number
          LATEST_BUILD=$(node -e "
            const https = require('https');
            const data = JSON.stringify({
              filters: [{criteria: [{filterType: 7, value: 'acedatacloud.acedatacloud-mcp'}]}],
              flags: 914
            });
            const req = https.request({
              hostname: 'marketplace.visualstudio.com',
              path: '/_apis/public/gallery/extensionquery',
              method: 'POST',
              headers: {'Content-Type':'application/json','Accept':'application/json;api-version=3.0-preview.1'}
            }, res => {
              let body = '';
              res.on('data', d => body += d);
              res.on('end', () => {
                try {
                  const r = JSON.parse(body);
                  const exts = r.results?.[0]?.extensions || [];
                  if (!exts.length) { console.log(0); return; }
                  const vers = exts[0].versions?.map(v => v.version) || [];
                  const todayPrefix = '${DATE_PREFIX}';
                  const todayVers = vers.filter(v => v.startsWith(todayPrefix));
                  if (!todayVers.length) { console.log(0); return; }
                  const builds = todayVers.map(v => parseInt(v.split('.')[3] || 0));
                  console.log(Math.max(...builds) + 1);
                } catch(e) { console.log(0); }
              });
            });
            req.on('error', () => console.log(0));
            req.write(data);
            req.end();
          ")

          VERSION="${DATE_PREFIX}.${LATEST_BUILD}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Publishing version $VERSION"

          # Update package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Package extension
        run: vsce package --no-git-tag-version

      - name: Publish to VS Code Marketplace
        run: vsce publish --no-git-tag-version -p ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        if: vars.OVSX_ENABLED == 'true'
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          npm install -g ovsx
          ovsx publish *.vsix -p "$OVSX_PAT"
